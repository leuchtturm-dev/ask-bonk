name: "Bonk GitHub Action"
description: "Run Bonk (OpenCode) in GitHub Actions workflows"
branding:
  icon: "git-pull-request"
  color: "orange"

inputs:
  model:
    description: "Model to use (e.g., opencode/claude-opus-4-5)"
    required: true

  agent:
    description: "Set the agent to use for this workflow. Falls back to the default_agent if set in config, else 'build'"
    required: false

  prompt:
    description: "Custom prompt to override the default prompt"
    required: false

  mentions:
    description: "Comma-separated trigger phrases (e.g., '/bonk,@ask-bonk')"
    required: false
    default: "/bonk,@ask-bonk"

  permissions:
    description: "Required permission level: 'admin', 'write', 'any', or 'CODEOWNERS' (checks .github/CODEOWNERS)"
    required: false
    default: "write"

  oidc_base_url:
    description: "Base URL for OIDC token exchange"
    required: false
    default: "https://ask-bonk.silverlock.workers.dev/auth"

  forks:
    description: "Post a 'not supported' comment on fork PRs. Set to 'false' to silently skip fork PRs."
    required: false
    default: "true"

  variant:
    description: "Model variant for provider-specific reasoning effort (e.g., high, max, minimal)"
    required: false

  token_permissions:
    description: "Scope the installation token: 'NO_PUSH' (can comment but not push), 'WRITE' (default), or a JSON permissions object"
    required: false

  opencode_version:
    description: "Pin to a specific OpenCode version (e.g., '1.2.16'). Falls back to 'latest' on invalid input."
    required: false
    default: "latest"

  opencode_dev:
    description: "Install OpenCode from dev branch instead of latest release"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Check mentions
      id: mentions
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        COMMENT_BODY: ${{ github.event.comment.body }}
        REVIEW_BODY: ${{ github.event.review.body }}
        MENTIONS: ${{ inputs.mentions }}
      run: |
        BODY=""

        case "$EVENT_NAME" in
          issue_comment|pull_request_review_comment)
            BODY="$COMMENT_BODY"
            ;;
          pull_request_review)
            BODY="$REVIEW_BODY"
            ;;
          issues|pull_request|workflow_dispatch|schedule)
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
            ;;
          *)
            echo "Unsupported event type: $EVENT_NAME"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
            ;;
        esac

        IFS=',' read -ra MENTION_ARRAY <<< "$MENTIONS"

        for mention in "${MENTION_ARRAY[@]}"; do
          mention="${mention#"${mention%%[![:space:]]*}"}"
          mention="${mention%"${mention##*[![:space:]]}"}"
          if [[ "$BODY" == *"$mention"* ]]; then
            echo "Found mention: $mention"
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi
        done

        echo "No matching mention found in comment"
        echo "skip=true" >> $GITHUB_OUTPUT

    - name: Setup bun
      if: success() && steps.mentions.outputs.skip != 'true'
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3"

    - name: Pre-flight orchestration
      if: success() && steps.mentions.outputs.skip != 'true'
      id: preflight
      shell: bash
      env:
        # permissions
        REQUIRED_PERMISSION: ${{ inputs.permissions }}
        COMMENT_ACTOR: ${{ github.event.comment.user.login }}
        REVIEW_ACTOR: ${{ github.event.review.user.login }}
        # setup + track
        OIDC_BASE_URL: ${{ inputs.oidc_base_url }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        GITHUB_REPOSITORY_NAME: ${{ github.event.repository.name }}
        ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        EVENT_NAME: ${{ github.event_name }}
        # version
        GH_TOKEN: ${{ github.token }}
        OPENCODE_VERSION: ${{ inputs.opencode_version }}
        OPENCODE_DEV: ${{ inputs.opencode_dev }}
        # prompt
        PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        PR_BASE_REPO: ${{ github.event.pull_request.base.repo.full_name }}
        REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.issue.pull_request.url && github.event.issue.number || github.event.pull_request.number || '' }}
        PR_URL: ${{ github.event.pull_request.url || github.event.issue.pull_request.url || '' }}
        USER_PROMPT: ${{ inputs.prompt }}
        ACTION_PATH: ${{ github.action_path }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        # fork-comment
        FORKS: ${{ inputs.forks }}
        ACTOR: ${{ github.event.comment.user.login || github.event.review.user.login || github.actor }}
        # track
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
        COMMENT_ID: ${{ github.event.comment.id }}
        COMMENT_CREATED_AT: ${{ github.event.comment.created_at }}
        ISSUE_CREATED_AT: ${{ github.event.issue.created_at || github.event.pull_request.created_at }}
        # token scoping
        TOKEN_PERMISSIONS: ${{ inputs.token_permissions }}
      run: bun run ${{ github.action_path }}/script/orchestrate.ts

    - name: Install opencode
      if: success() && steps.mentions.outputs.skip != 'true' && steps.preflight.outputs.skip != 'true'
      shell: bash
      env:
        OPENCODE_DEV: ${{ steps.preflight.outputs.dev }}
        OPENCODE_VERSION: ${{ steps.preflight.outputs.opencode_version }}
      run: |
        set -euo pipefail
        if [ "$OPENCODE_DEV" = "true" ]; then
          bun install -g opencode-ai@dev
        else
          bun install -g "opencode-ai@${OPENCODE_VERSION}"
        fi
        echo "opencode version: $(opencode version 2>/dev/null || echo 'unknown')"

    - name: Configure Git
      if: success() && steps.mentions.outputs.skip != 'true' && steps.preflight.outputs.skip != 'true'
      shell: bash
      run: |
        git config --global user.name "ask-bonk[bot]"
        git config --global user.email "ask-bonk[bot]@users.noreply.github.com"
        # Replace the GITHUB_TOKEN credential that actions/checkout persists in
        # local git config. Pushes authenticated with GITHUB_TOKEN don't trigger
        # downstream workflows (by design). The App installation token obtained
        # via OIDC exchange does trigger them.
        if [ -n "${GH_TOKEN}" ]; then
          server_url="${GITHUB_SERVER_URL:-https://github.com}"
          host="${server_url#https://}"
          host="${host#http://}"
          git config --unset-all "http.${server_url}/.extraheader" 2>/dev/null || true
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@${host}/${GITHUB_REPOSITORY}.git"
        fi

    - name: Run opencode
      if: |
        success() && steps.mentions.outputs.skip != 'true' && steps.preflight.outputs.skip != 'true'
        && (steps.preflight.outputs.is_fork != 'true' || steps.preflight.outputs.run_opencode == 'true')
      id: opencode
      shell: bash
      run: |
        set +e
        # GH_TOKEN is the App token written to GITHUB_ENV by the OIDC exchange step.
        export USE_GITHUB_TOKEN=true
        export GITHUB_TOKEN="${GH_TOKEN}"
        timeout 45m opencode github run
        EXIT_CODE=$?
        echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
        exit $EXIT_CODE
      env:
        MODEL: ${{ inputs.model }}
        AGENT: ${{ inputs.agent }}
        VARIANT: ${{ inputs.variant }}
        PROMPT: ${{ steps.preflight.outputs.value }}
        SHARE: false
        MENTIONS: ${{ inputs.mentions }}
        OIDC_BASE_URL: ${{ inputs.oidc_base_url }}
        # Expose the PR/issue number so OpenCode (and any shell commands the
        # model runs, e.g. `gh api .../pulls/$PR_NUMBER/reviews`) can
        # reference the correct PR without having to infer it from git or
        # the GitHub API. This prevents the model from accidentally
        # discovering and acting on a different PR.
        PR_NUMBER: ${{ github.event.issue.pull_request.url && github.event.issue.number || github.event.pull_request.number || '' }}
        ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number || '' }}

    - name: Finalize Bonk run
      if: |
        always() && steps.preflight.outcome == 'success' && steps.mentions.outputs.skip != 'true'
        && steps.preflight.outputs.skip != 'true'
        && (steps.preflight.outputs.is_fork != 'true' || steps.preflight.outputs.run_opencode == 'true')
      shell: bash
      env:
        OIDC_BASE_URL: ${{ inputs.oidc_base_url }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        GITHUB_REPOSITORY_NAME: ${{ github.event.repository.name }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        OPENCODE_STATUS: ${{ steps.opencode.outcome }}
        # Pass issue/PR context so the server can post failure comments even
        # when the run was never tracked or was already removed from activeRuns.
        ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
      run: bun run ${{ github.action_path }}/script/finalize.ts
